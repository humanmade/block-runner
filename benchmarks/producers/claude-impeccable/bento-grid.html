<section class="bento">
  <h2>One toolkit, three superpowers</h2>
  <div class="grid">
    <div class="tile media">
      <div class="media-img">
        <img src="panel.png" alt="Block panel screenshot" />
      </div>
      <div class="media-body">
        <h3>Deterministic</h3>
        <p>The same input always yields the same blocks.</p>
      </div>
    </div>
    <div class="tile cta" style="background-image:url(gate-bg.jpg)">
      <h3>Editor-valid</h3>
      <p>Every block passes the editor's own gate.</p>
      <a class="btn" href="/gate">See the gate</a>
    </div>
    <div class="tile card">
      <img class="icon" src="open.svg" alt="" aria-hidden="true" />
      <h3>Open</h3>
      <ul>
        <li>MIT licensed</li>
        <li>Scriptable CLI</li>
      </ul>
    </div>
  </div>
</section>
