name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node 18 is EOL; keep in step with engines (>=20).
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      # Keep lockfile installs consistent across Node matrix (npm 10 vs 11 peer graphs).
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run verify
